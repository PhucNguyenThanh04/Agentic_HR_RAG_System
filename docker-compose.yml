name: hr_bot

services:
  postgres:
    image: postgres:16-alpine
    container_name: hr_bot_postgres
    restart: unless-stopped
    command: ["postgres", "-c", "timezone=Asia/Ho_Chi_Minh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hr_bot}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: hr_bot_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: hr_bot_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend

  api-service:
    build: ./api-service
    container_name: hr_bot_api_service
    restart: unless-stopped
    env_file:
      - ./api-service/.env
    environment:
      # Override để dùng Docker network (ưu tiên cao hơn env_file)
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/hr_bot
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0
      RAG_API_URL: http://agentic-rag:8081
      AI_SERVICE_BASE_URL: http://host.docker.internal:8001
    command: ["sh", "-c", "alembic upgrade head && python run.py"]
    ports:
      - "${API_SERVICE_PORT:-8000}:8000"
    volumes:
      - api_uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  agentic-rag:
    build: ./agentic-rag
    container_name: hr_bot_agentic_rag
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    env_file:
      - ./agentic-rag/.env
    environment:
      # Override để dùng Docker network (ưu tiên cao hơn env_file)
      API_HOST: 0.0.0.0
      API_PORT: 8081
      API_SERVER_BASE_URL: http://api-service:8000
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/1
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${AGENTIC_RAG_PORT:-8081}:8081"
    volumes:
      - agentic_logs:/app/logs_agent
      - hf_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      api-service:
        condition: service_started
    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  api_uploads:
  agentic_logs:
  hf_cache:
