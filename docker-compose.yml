services:
  postgres:
    image: postgres:16-alpine
    container_name: hr_bot_postgres
    restart: unless-stopped
    command: ["postgres", "-c", "timezone=Asia/Ho_Chi_Minh"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hr_bot}
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - hr_bot_net

  redis:
    image: redis:7-alpine
    container_name: hr_bot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - hr_bot_net

  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: hr_bot_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - hr_bot_net

  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    container_name: hr_bot_api_service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_NAME: API Service
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${API_DEBUG:-true}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000

      RAG_API_URL: http://agentic-rag:8001
      RAG_API_KEY: ${RAG_API_KEY:-dev-rag-api-key}

      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL:-http://host.docker.internal:9000}
      FACE_SERVICE_API_KEY: ${FACE_SERVICE_API_KEY:-dev-face-api-key}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-900}

      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-hr_bot}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-hr_bot}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DATABASE_TIMEZONE: Asia/Ho_Chi_Minh

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_URL: redis://redis:6379/0
      REDIS_DB_SESSION: 0
      REDIS_DB_ATTENDANCE: 1

      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.gmail.com}
      MAIL_TLS: ${MAIL_TLS:-true}
      MAIL_SSL: ${MAIL_SSL:-false}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-change-me}
      REFRESH_TOKEN_SECRET_KEY: ${REFRESH_TOKEN_SECRET_KEY:-dev-refresh-secret-change-me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      LOGIN_RATE_LIMIT_IP_MAX_ATTEMPTS: ${LOGIN_RATE_LIMIT_IP_MAX_ATTEMPTS:-20}
      LOGIN_RATE_LIMIT_USER_MAX_ATTEMPTS: ${LOGIN_RATE_LIMIT_USER_MAX_ATTEMPTS:-10}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-900}

      PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-15}
      OTP_EXPIRE_MINUTES: ${OTP_EXPIRE_MINUTES:-5}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      OTP_LOCK_MINUTES: ${OTP_LOCK_MINUTES:-3}

      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-true}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin12345}
      BOOTSTRAP_ADMIN_FULL_NAME: ${BOOTSTRAP_ADMIN_FULL_NAME:-System Administrator}

      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    command: >
      sh -c "alembic upgrade head && python run.py"
    ports:
      - "${API_SERVICE_PORT:-8000}:8000"
    volumes:
      - api_uploads:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - hr_bot_net

  agentic-rag:
    build:
      context: ./agentic-rag
      dockerfile: Dockerfile
    container_name: hr_bot_agentic_rag
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      api-service:
        condition: service_healthy
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-2048}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60}

      AGENT_MAX_STEPS: ${AGENT_MAX_STEPS:-5}
      AGENT_PROMPT_WINDOW_STEPS: ${AGENT_PROMPT_WINDOW_STEPS:-2}
      AGENT_PROMPT_ACTION_INPUT_LIMIT_CHARS: ${AGENT_PROMPT_ACTION_INPUT_LIMIT_CHARS:-700}
      AGENT_PROMPT_DEFAULT_OBSERVATION_LIMIT_CHARS: ${AGENT_PROMPT_DEFAULT_OBSERVATION_LIMIT_CHARS:-1000}
      AGENT_PROMPT_ERROR_OBSERVATION_LIMIT_CHARS: ${AGENT_PROMPT_ERROR_OBSERVATION_LIMIT_CHARS:-400}
      CHAT_HISTORY_WINDOW_MESSAGES: ${CHAT_HISTORY_WINDOW_MESSAGES:-6}
      AGENT_PROMPT_VECTOR_SEARCH_LIMIT_CHARS: ${AGENT_PROMPT_VECTOR_SEARCH_LIMIT_CHARS:-1500}
      AGENT_PROMPT_ATTENDANCE_QUERY_LIMIT_CHARS: ${AGENT_PROMPT_ATTENDANCE_QUERY_LIMIT_CHARS:-3000}
      AGENT_PROMPT_EMPLOYEE_QUERY_LIMIT_CHARS: ${AGENT_PROMPT_EMPLOYEE_QUERY_LIMIT_CHARS:-700}
      AGENT_PROMPT_SHIFT_QUERY_LIMIT_CHARS: ${AGENT_PROMPT_SHIFT_QUERY_LIMIT_CHARS:-700}
      AGENT_PROMPT_ASK_USER_LIMIT_CHARS: ${AGENT_PROMPT_ASK_USER_LIMIT_CHARS:-500}

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION_POLICY: ${QDRANT_COLLECTION_POLICY:-hr_policies}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-10}
      QDRANT_UPSERT_BATCH_SIZE: ${QDRANT_UPSERT_BATCH_SIZE:-64}

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379/0

      DENSE_VECTOR_NAME: ${DENSE_VECTOR_NAME:-dense}
      SPARSE_VECTOR_NAME: ${SPARSE_VECTOR_NAME:-sparse}
      BGE_M3_DENSE_SIZE: ${BGE_M3_DENSE_SIZE:-1024}

      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      RERANKER_MODEL: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      RERANKER_DEVICE: ${RERANKER_DEVICE:-cpu}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-10}
      RERANK_TOP_N: ${RERANK_TOP_N:-5}
      RETRIEVAL_SCORE_THRESHOLD: ${RETRIEVAL_SCORE_THRESHOLD:-0.0}

      API_HOST: 0.0.0.0
      API_PORT: 8001
      API_DEBUG: ${RAG_DEBUG:-true}
      API_SERVER_BASE_URL: http://api-service:8000
      RAG_API_KEY: ${RAG_API_KEY:-dev-rag-api-key}
      DATABASE_TIMEZONE: Asia/Ho_Chi_Minh
    ports:
      - "${AGENTIC_RAG_PORT:-8001}:8001"
    volumes:
      - agentic_logs:/app/logs_agent
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 30
      start_period: 180s
    networks:
      - hr_bot_net

networks:
  hr_bot_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  api_uploads:
  agentic_logs:
  hf_cache:
